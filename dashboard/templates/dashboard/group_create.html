{% extends "base.html" %}

{% block title %}Create Group{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">🧩 Create Group</h1>
        <p class="page-subtitle">Organize users into a group under a company</p>
    </div>
</div>

<div class="glass-card">
    <form method="post">

        {% csrf_token %}

        <div class="form-group">
            <label>Group Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="e.g. Engineering Team"
                required>
        </div>

        <div class="form-group">
            <label>Company</label>

        <label>Company</label>

        <input
            type="text"
            class="form-control"
            value="{{ company.name }}"
            readonly
        >
    </div>

        <div class="form-divider-heading">Members</div>

        <div class="member-select-list">

            {% for user in users %}
            <label class="member-check">
                <input type="checkbox" name="members" value="{{ user.id }}">
                <div class="user-avatar user-avatar-sm">
                    {{ user.first_name|slice:":1"|upper|default:user.email|slice:":1"|upper }}
                </div>
                <div class="member-check-info">
                    <div class="member-check-name">
                        {% if user.first_name %}{{ user.first_name }} {{ user.last_name }}{% else %}{{ user.email }}{% endif %}
                    </div>
                    <div class="member-check-email">{{ user.email }}</div>
                </div>
            </label>
            {% empty %}
            <p class="form-hint">No users available.</p>
            {% endfor %}

        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                Create Group
            </button>

            <a href="{% url 'admin_group_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
