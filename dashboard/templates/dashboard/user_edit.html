{% extends "base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}

<div class="glass-card">
    <h2>Edit User</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>First Name</label>
            <input
                type="text"
                name="first_name"
                class="form-control"
                value="{{ user_obj.first_name }}"
                required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input
                type="text"
                name="last_name"
                class="form-control"
                value="{{ user_obj.last_name }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                value="{{ user_obj.email }}"
                required>
        </div>

        <div class="form-group">
           <label>Custom Role</label>

           <select name="custom_role" class="form-control">

               <option value="">--------</option>

               {% for role in roles %}

                  <option
                     value="{{ role.id }}"
                     {% if user_obj.custom_role == role %}selected{% endif %}>
                     {{ role.name }}
                  </option>

                { % endfor %}

            </select>

        </div>

        <div class="form-group">
            <label>Role</label>
            <select name="role" class="form-control">
                <option value="admin" {% if user_obj.role == "admin" %}selected{% endif %}>Admin</option>
                <option value="manager" {% if user_obj.role == "manager" %}selected{% endif %}>Manager</option>
                <option value="member" {% if user_obj.role == "member" %}selected{% endif %}>Member</option>
            </select>
        </div>

        <div class="form-group">
            <label>New Password (optional)</label>
            <input
                type="password"
                name="password"
                class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">
            Update User
        </button>

        <a href="{% url 'admin_users' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>

{% endblock %}
