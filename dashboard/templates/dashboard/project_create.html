{% extends "base.html" %}

{% block title %}Create Project{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2>Create Project</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary">
            Create Project
        </button>

        <a href="{% url 'admin_project_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
