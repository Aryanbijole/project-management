{% extends "base.html" %}

{% block title %}Edit Project{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">✏️ Edit Project</h1>
        <p class="page-subtitle">Update project details</p>
    </div>
</div>

<div class="glass-card">
    <form method="post" class="django-form">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                Update Project
            </button>

            <a href="{% url 'admin_project_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
