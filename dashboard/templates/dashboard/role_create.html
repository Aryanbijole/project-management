{% extends "base.html" %}

{% block title %}Create Role{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">🛡️ Create Role</h1>
        <p class="page-subtitle">Define a role and choose what it's allowed to do</p>
    </div>
</div>

<div class="glass-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Role Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Project Manager" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="What is this role for?"></textarea>
        </div>

        <div class="form-divider-heading">Permissions</div>

        <div class="permissions-grid">

            <label class="permission-check">
                <input type="checkbox" name="can_manage_users">
                <span>👥 Manage Users</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_manage_projects">
                <span>📁 Manage Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_manage_companies">
                <span>🏢 Manage Companies</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_manage_groups">
                <span>🧩 Manage Groups</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_create_projects">
                <span>➕ Create Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_edit_projects">
                <span>✏️ Edit Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_delete_projects">
                <span>🗑️ Delete Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_create_tasks">
                <span>➕ Create Tasks</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_edit_tasks">
                <span>✏️ Edit Tasks</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_delete_tasks">
                <span>🗑️ Delete Tasks</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_upload_files">
                <span>📎 Upload Files</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_view_reports">
                <span>📊 View Reports</span>
            </label>

        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">
                Create Role
            </button>
            <a href="{% url 'admin_role_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
