{% extends "base.html" %}

{% block title %}Edit Role{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">🛡️ Edit Role</h1>
        <p class="page-subtitle">Update role details and permissions</p>
    </div>
</div>

<div class="glass-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Role Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ role.name }}"
                required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea
                name="description"
                class="form-control"
                rows="3">{{ role.description }}</textarea>
        </div>

        <div class="form-divider-heading">Permissions</div>

        <div class="permissions-grid">

            <label class="permission-check">
                <input type="checkbox" name="can_manage_users" {% if role.can_manage_users %}checked{% endif %}>
                <span>👥 Manage Users</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_manage_projects" {% if role.can_manage_projects %}checked{% endif %}>
                <span>📁 Manage Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_manage_companies" {% if role.can_manage_companies %}checked{% endif %}>
                <span>🏢 Manage Companies</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_manage_groups" {% if role.can_manage_groups %}checked{% endif %}>
                <span>🧩 Manage Groups</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_create_projects" {% if role.can_create_projects %}checked{% endif %}>
                <span>➕ Create Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_edit_projects" {% if role.can_edit_projects %}checked{% endif %}>
                <span>✏️ Edit Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_delete_projects" {% if role.can_delete_projects %}checked{% endif %}>
                <span>🗑️ Delete Projects</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_create_tasks" {% if role.can_create_tasks %}checked{% endif %}>
                <span>➕ Create Tasks</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_edit_tasks" {% if role.can_edit_tasks %}checked{% endif %}>
                <span>✏️ Edit Tasks</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_delete_tasks" {% if role.can_delete_tasks %}checked{% endif %}>
                <span>🗑️ Delete Tasks</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_upload_files" {% if role.can_upload_files %}checked{% endif %}>
                <span>📎 Upload Files</span>
            </label>

            <label class="permission-check">
                <input type="checkbox" name="can_view_reports" {% if role.can_view_reports %}checked{% endif %}>
                <span>📊 View Reports</span>
            </label>

        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">
                Update Role
            </button>
            <a href="{% url 'admin_role_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
