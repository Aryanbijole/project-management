{% extends "base.html" %}

{% block title %}Create Company{% endblock %}

{% block content %}

<h2>Create Company</h2>

<form method="post">

    {% csrf_token %}

    <div class="form-group">

        <label>Company Name</label>

        <input
            type="text"
            name="name"
            class="form-control"
            required
        >

    </div>

    <hr>

    <h4>Company Administrator</h4>

    <div class="form-group">
        <label>First Name</label>
        <input
            type="text"
            name="admin_first_name"
            class="form-control"
            required
        >
    </div>

    <div class="form-group">
        <label>Last Name</label>
        <input
            type="text"
            name="admin_last_name"
            class="form-control"
        >
    </div>

    <div class="form-group">
        <label>Email</label>
        <input
            type="email"
            name="admin_email"
            class="form-control"
            required
        >
    </div>

    <div class="form-group">
        <label>Password</label>
        <input
            type="password"
            name="admin_password"
            class="form-control"
            required
        >
    </div>

    <br>

    <button class="btn btn-primary">
        Create Company
    </button>

    <a href="{% url 'admin_company_list' %}"
       class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
