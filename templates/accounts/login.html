{% extends 'base.html' %}

{% block title %}Log In - Basecamp PM{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">Log in to access your dashboard</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px; height: 48px;">
                Log In
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 24px; font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent); font-weight: 600; text-decoration: none;">Register</a>
        </div>
    </div>
</div>
{% endblock %}
