{% extends 'base.html' %}

{% block title %}Accept Invitation - {{ company.name }}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h1>Join {{ company.name }}</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">You have been invited to join the organization as an <strong>{{ invitation.get_role_display }}</strong></p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" value="{{ invitation.email }}" disabled>
            </div>
            
            <div class="grid-cols-2" style="gap: 16px; margin-bottom: 0;">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px; height: 48px;">
                Accept Invitation
            </button>
        </form>
    </div>
</div>
{% endblock %}
