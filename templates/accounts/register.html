{% extends 'base.html' %}

{% block title %}Register - Basecamp PM{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">Sign up to start managing your projects</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@company.com" required>
            </div>
            
            <div class="grid-cols-2" style="gap: 16px; margin-bottom: 0;">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="role">Default Role</label>
                <select id="role" name="role" class="form-control">
                    {% for key, val in roles %}
                    <option value="{{ key }}" {% if key == 'member' %}selected{% endif %}>{{ val }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px; height: 48px;">
                Sign Up
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 24px; font-size: 0.9rem;">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--accent); font-weight: 600; text-decoration: none;">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
