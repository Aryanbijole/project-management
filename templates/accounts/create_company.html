{% extends "base.html" %}

{% block title %}
Create Company
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Create Your Company</h3>
                </div>

                <div class="card-body">

                    <p class="text-muted">
                        Create your first organization. You will automatically become its Company Administrator.
                    </p>

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Company Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required>

                        </div>

                        <div class="d-flex justify-content-between">

                            <button
                                type="submit"
                                class="btn btn-primary">

                                Create Company

                            </button>

                            <a href="{% url 'dashboard' %}"
                               class="btn btn-secondary">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
