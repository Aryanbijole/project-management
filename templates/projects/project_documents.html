{% extends 'base.html' %}

{% block title %}Project Documents{% endblock %}

{% block content %}

<h1>📁 Project Documents</h1>

<form method="POST"
      enctype="multipart/form-data"
      action="{% url 'upload_project_document' project.id %}">

    {% csrf_token %}

    <input
        type="text"
        name="title"
        placeholder="Document Title"
        required>

    <br><br>

    <input
        type="file"
        name="file"
        required>

    <br><br>

    <button
        type="submit"
        class="btn btn-primary">
        Upload
    </button>

</form>

<hr>

{% for doc in documents %}

<div class="glass-card">

    <strong>{{ doc.title }}</strong>

    <br>

    <a href="{{ doc.file.url }}">
        Download File
    </a>

    <br>

    Uploaded by:
    {{ doc.uploaded_by.email }}

</div>

{% empty %}

<p>No documents uploaded.</p>

{% endfor %}

{% endblock %}
